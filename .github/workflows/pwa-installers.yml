name: Build PWA Installers

on:
  push:
    tags: ['pwa-v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Node 24
      uses: actions/setup-node@v4
      with:
        node-version: 24
        
    - name: Install Android build tools
      run: |
        npm install -g @bubblewrap/cli || echo "Bubblewrap CLI install failed"
        
    - name: Generate Android APK
      run: |
        mkdir -p pwa-packages
        PWA_URL="https://david123ojikutu.github.io/MnemoMark/"
        echo "Generating Android APK from: $PWA_URL"
        
        # Use Bubblewrap CLI to generate Android APK
        npx -y @bubblewrap/cli init \
          --manifest "$PWA_URL/manifest.json" \
          --directory ./android-build || {
          echo "Bubblewrap init failed, trying alternative..."
        }
        
        # Build APK if init succeeded
        if [ -d "./android-build" ]; then
          cd android-build
          npx @bubblewrap/cli build || echo "Build failed"
          find . -name "*.apk" -exec cp {} ../pwa-packages/ \; || echo "No APK found"
          cd ..
        fi
        
    - name: Generate Windows MSIX
      run: |
        PWA_URL="https://david123ojikutu.github.io/MnemoMark/"
        echo "Note: Windows MSIX generation requires manual setup via PWABuilder.com"
        echo "Visit: https://www.pwabuilder.com/ and enter: $PWA_URL"
        echo "Download the MSIX package and add it to pwa-packages/"
        echo "For now, creating placeholder..."
        touch pwa-packages/README-MSIX.txt
        echo "Windows MSIX must be generated manually via PWABuilder.com" > pwa-packages/README-MSIX.txt
        
    - name: List generated files
      run: |
        echo "Generated files:"
        find pwa-packages -type f || echo "No files found"
          
    - name: Extract version from tag
      id: tag_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/pwa-v}" >> $GITHUB_OUTPUT

    - name: Create PWA Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/pwa-v')
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        name: PWA Release ${{ steps.tag_version.outputs.VERSION }}
        body: |
          ## PWA Installers
          - **Windows**: `.msix` package
          - **Android**: `.apk` package
        files: |
          pwa-packages/**/*.msix
          pwa-packages/**/*.apk
        generate_release_notes: true
        draft: false
        prerelease: false
