name: Build PWA Installers

on:
  push:
    tags: ['pwa-v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Node 24
      uses: actions/setup-node@v4
      with:
        node-version: 24
        
    - name: Generate PWA Packages via PWABuilder API
      run: |
        mkdir -p pwa-packages
        PWA_URL="https://david123ojikutu.github.io/MnemoMark/"
        echo "Generating PWA packages from: $PWA_URL"
        
        # Use PWABuilder web API to generate packages
        echo "Calling PWABuilder API..."
        
        # Generate Windows MSIX
        echo "Generating Windows MSIX package..."
        curl -X POST "https://pwabuilder-api.azurewebsites.net/msix/generate" \
          -H "Content-Type: application/json" \
          -d "{\"url\": \"$PWA_URL\"}" \
          -o pwa-packages/windows.zip 2>&1 || {
          echo "MSIX generation failed"
        }
        
        # Generate Android APK
        echo "Generating Android APK package..."
        curl -X POST "https://pwabuilder-api.azurewebsites.net/apk/generate" \
          -H "Content-Type: application/json" \
          -d "{\"url\": \"$PWA_URL\"}" \
          -o pwa-packages/android.zip 2>&1 || {
          echo "APK generation failed"
        }
        
        # Extract zip files if they exist
        cd pwa-packages
        for zip in *.zip; do
          if [ -f "$zip" ]; then
            echo "Extracting $zip..."
            unzip -q "$zip" && rm "$zip" || echo "Failed to extract $zip"
          fi
        done
        cd ..
        
        echo "Generated files:"
        find pwa-packages -type f || echo "No files found"
          
    - name: Extract version from tag
      id: tag_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/pwa-v}" >> $GITHUB_OUTPUT

    - name: Create PWA Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/pwa-v')
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        name: PWA Release ${{ steps.tag_version.outputs.VERSION }}
        body: |
          ## PWA Installers
          - **Windows**: `.msix` package
          - **Android**: `.apk` package
        files: |
          pwa-packages/**/*.msix
          pwa-packages/**/*.apk
        generate_release_notes: true
        draft: false
        prerelease: false
