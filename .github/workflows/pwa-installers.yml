name: PWA Store Packages

on:
  push:
    tags: ['pwa-v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 24
        
    - name: Download PWABuilder Packages
      run: |
        mkdir -p pwa-packages
        PWA_URL="https://david123ojikutu.github.io/MnemoMark/"
        echo "Downloading PWA packages from PWABuilder API for: $PWA_URL"
        
        # Download Windows MSIX via PWABuilder REST API
        echo "Downloading Windows MSIX..."
        curl -L -o pwa-packages/MnemoMark-PWA-Windows.msix \
          "https://www.pwabuilder.com/builds/api/generate?appurl=${PWA_URL}&platform=windows" || {
          echo "Windows MSIX download failed"
        }
        
        # Download Android APK
        echo "Downloading Android APK..."
        curl -L -o pwa-packages/MnemoMark-PWA-Android.apk \
          "https://www.pwabuilder.com/builds/api/generate?appurl=${PWA_URL}&platform=android" || {
          echo "Android APK download failed"
        }
        
        echo "Downloaded files:"
        ls -lh pwa-packages/ || echo "No files downloaded"
          
    - name: Extract version from tag
      id: tag_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/pwa-v}" >> $GITHUB_OUTPUT

    - name: Create PWA Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/pwa-v')
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        name: PWA Release ${{ steps.tag_version.outputs.VERSION }}
        body: |
          ## PWA Installers
          - **Windows**: `.msix` package
          - **Android**: `.apk` package
        files: |
          pwa-packages/*.msix
          pwa-packages/*.apk
        generate_release_notes: true
        draft: false
        prerelease: false
