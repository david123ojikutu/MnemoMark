name: Desktop - Build (Windows, Linux, macOS)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # Electron 5.0.4 doesn't have darwin-arm64 builds, so we must use an Intel macOS runner.
        os: [windows-2022, ubuntu-22.04, macos-13]

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 16
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install deps
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: ${{ matrix.os == 'macos-13' && '1' || '0' }}

      - name: Download Electron x64 for macOS (Electron 5.0.4 doesn't support ARM64)
        if: matrix.os == 'macos-13'
        working-directory: desktop
        run: |
          mkdir -p node_modules/electron/dist
          curl -L https://github.com/electron/electron/releases/download/v5.0.4/electron-v5.0.4-darwin-x64.zip -o electron.zip
          unzip -q electron.zip -d node_modules/electron/dist/
          rm electron.zip
          echo "5.0.4" > node_modules/electron/path.txt
          echo "node_modules/electron/dist/Electron.app/Contents/MacOS/Electron" >> node_modules/electron/path.txt

      - name: Build installers
        run: npm run dist -- --publish never

      - name: Upload artifacts (Windows)
        if: matrix.os == 'windows-2022'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          if-no-files-found: error
          path: |
            desktop/dist/*.exe
            desktop/dist/*.exe.blockmap
            desktop/dist/latest*.yml

      - name: Upload artifacts (Linux)
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          if-no-files-found: error
          path: |
            desktop/dist/*.AppImage
            desktop/dist/*.deb
            desktop/dist/latest*.yml

      - name: Upload artifacts (macOS)
        if: matrix.os == 'macos-13'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          if-no-files-found: error
          path: |
            desktop/dist/*.dmg
            desktop/dist/*.zip
            desktop/dist/latest*.yml

  release:
    name: Release (tag)
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build]
    runs-on: ubuntu-22.04

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Create GitHub Release + upload files
        uses: softprops/action-gh-release@v2
        with:
          files: dist-artifacts/**/*
