name: Desktop - Build (Windows, Linux)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, ubuntu-22.04]

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 16
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build installers
        run: npm run dist -- --publish never

      - name: Upload artifacts (Windows)
        if: matrix.os == 'windows-2022'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          if-no-files-found: error
          path: |
            desktop/dist/*.exe

      - name: Upload artifacts (Linux)
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          if-no-files-found: error
          path: |
            desktop/dist/*.AppImage
            desktop/dist/*.deb

  release:
    name: Release (tag)
    needs: [build]
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all desktop build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Extract all artifacts
        run: |
          find dist-artifacts -name "*.zip" -type f | while read zipfile; do
            dir=$(dirname "$zipfile")
            unzip -q "$zipfile" -d "$dir" && rm "$zipfile"
          done

      - name: Extract version from tag
        id: tag_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Prepare installer files
        run: |
          mkdir -p release-files
          # Copy only the 3 installer files we need
          find dist-artifacts -name "*.exe" -type f -exec cp {} release-files/ \;
          find dist-artifacts -name "*.AppImage" -type f -exec cp {} release-files/ \;
          find dist-artifacts -name "*.deb" -type f -exec cp {} release-files/ \;
          echo "Files to upload:"
          ls -lh release-files/

      - name: Create GitHub Release + upload desktop files
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ steps.tag_version.outputs.VERSION }}
          body: |
            ## Desktop Installers
            - **Windows**: `.exe` installer
            - **Linux**: `.AppImage` and `.deb` packages
          files: |
            release-files/*.exe
            release-files/*.AppImage
            release-files/*.deb
          generate_release_notes: true
          draft: false
          prerelease: false
