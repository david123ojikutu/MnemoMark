name: PWA - Build and Deploy

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    name: Build and Deploy PWA
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

      - name: Generate PWA packages
        run: |
          mkdir -p pwa/packages
          # Try PWABuilder CLI - if it fails, create a zip of the PWA files instead
          npx -y @pwabuilder/cli package "https://david123ojikutu.github.io/MnemoMark/" \
            --platform windows --platform android \
            --out ./pwa/packages 2>&1 || {
            echo "PWA Builder CLI failed, creating zip package instead..."
            cd dist
            zip -r ../pwa/packages/MnemoMark-PWA.zip . || {
              echo "Zip creation failed, but continuing..."
            }
          }

      - name: Upload PWA packages
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pwa-packages
          path: pwa/packages/
          retention-days: 30

      - name: Update Release with PWA packages (if tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            pwa/packages/**/*.msix
            pwa/packages/**/*.apk
            pwa/packages/**/*.zip
          draft: false
          prerelease: false
