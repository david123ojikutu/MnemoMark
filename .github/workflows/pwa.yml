name: PWA - Build and Deploy

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    name: Build and Deploy PWA
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

      - name: Wait for GitHub Pages deployment (if tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "Waiting for GitHub Pages to be ready..."
          sleep 30

      - name: Generate PWA packages
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p pwa/packages
          echo "Generating PWA packages from deployed URL..."
          # Use PWABuilder CLI to generate packages from the deployed PWA
          npx -y @pwabuilder/cli package "https://david123ojikutu.github.io/MnemoMark/" \
            --platform windows --platform android \
            --out ./pwa/packages 2>&1 || {
            echo "PWA Builder CLI failed. Checking what was generated..."
            ls -la pwa/packages/ || echo "No packages directory"
          }
          echo "Generated files:"
          find pwa/packages -type f || echo "No files found"

      - name: Upload PWA packages
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pwa-packages
          path: pwa/packages/
          retention-days: 30

  release:
    name: Release PWA packages
    needs: [build-and-deploy]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download PWA packages
        uses: actions/download-artifact@v4
        with:
          name: pwa-packages
          path: pwa-artifacts

      - name: Extract all artifacts
        run: |
          find pwa-artifacts -name "*.zip" -type f | while read zipfile; do
            dir=$(dirname "$zipfile")
            unzip -q "$zipfile" -d "$dir" && rm "$zipfile"
          done

      - name: Extract version from tag
        id: tag_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Prepare PWA installer files
        run: |
          mkdir -p release-files
          echo "Searching for PWA installer files in pwa-artifacts..."
          find pwa-artifacts -type f -name "*.msix" -exec cp {} release-files/ \;
          find pwa-artifacts -type f -name "*.apk" -exec cp {} release-files/ \;
          echo "Files found to upload:"
          ls -lh release-files/ || echo "No PWA installer files found!"
          if [ ! -f release-files/*.msix ] && [ ! -f release-files/*.apk ]; then
            echo "ERROR: No PWA installer files (.msix or .apk) found!"
            echo "Contents of pwa-artifacts:"
            find pwa-artifacts -type f
            exit 1
          fi

      - name: Update Release with PWA packages
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          body: |
            ## PWA Installers
            - **Windows**: `.msix` package
            - **Android**: `.apk` package
          files: |
            release-files/*.msix
            release-files/*.apk
          append_body: true
          draft: false
          prerelease: false