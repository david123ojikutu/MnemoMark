name: PWA - Build and Deploy

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    name: Build and Deploy PWA
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

      - name: Generate PWA packages
        run: |
          mkdir -p pwa/packages
          # Try PWABuilder CLI - if it fails, create a zip of the PWA files instead
          npx -y @pwabuilder/cli package "https://david123ojikutu.github.io/MnemoMark/" \
            --platform windows --platform android \
            --out ./pwa/packages 2>&1 || {
            echo "PWA Builder CLI failed, creating zip package instead..."
            cd dist
            zip -r ../pwa/packages/MnemoMark-PWA.zip . || {
              echo "Zip creation failed, but continuing..."
            }
          }

      - name: Upload PWA packages
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pwa-packages
          path: pwa/packages/
          retention-days: 30

  release:
    name: Release PWA packages
    needs: [build-and-deploy]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download PWA packages
        uses: actions/download-artifact@v4
        with:
          name: pwa-packages
          path: pwa-artifacts

      - name: Extract all artifacts
        run: |
          find pwa-artifacts -name "*.zip" -type f | while read zipfile; do
            dir=$(dirname "$zipfile")
            unzip -q "$zipfile" -d "$dir" && rm "$zipfile"
          done

      - name: Extract version from tag
        id: tag_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Prepare PWA installer files
        run: |
          mkdir -p release-files
          # Copy only the 2 installer files we need
          find pwa-artifacts -name "*.msix" -type f -exec cp {} release-files/ \;
          find pwa-artifacts -name "*.apk" -type f -exec cp {} release-files/ \;
          echo "Files to upload:"
          ls -lh release-files/

      - name: Update Release with PWA packages
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          body: |
            ## PWA Installers
            - **Windows**: `.msix` package
            - **Android**: `.apk` package
          files: |
            release-files/*.msix
            release-files/*.apk
          append_body: true
          draft: false
          prerelease: false