name: PWA - Build and Deploy

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    name: Build and Deploy PWA
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

      - name: Generate PWA packages
        run: |
          mkdir -p pwa/packages
          npx @pwabuilder/pwabuilder --url "https://david123ojikutu.github.io/MnemoMark/" \
            --platform windows --platform android \
            --out ./pwa/packages || echo "PWA Builder failed (optional step)"

      - name: Upload PWA packages
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pwa-packages
          path: pwa/packages/
          retention-days: 30
