name: PWA - Build and Deploy

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    name: Build and Deploy PWA
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

      - name: Wait for GitHub Pages deployment (if tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "Waiting for GitHub Pages deployment to complete..."
          echo "Deployment URL: https://github.com/david123ojikutu/MnemoMark/deployments/github-pages"
          echo "PWA URL: https://david123ojikutu.github.io/MnemoMark/"
          # Wait longer for deployment to propagate
          sleep 60
          echo "Checking if PWA is accessible..."
          curl -I https://david123ojikutu.github.io/MnemoMark/ || echo "PWA not yet accessible"

      - name: Generate PWA packages
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p pwa/packages
          echo "Generating PWA packages from deployed URL: https://david123ojikutu.github.io/MnemoMark/"
          
          # Try PWABuilder CLI
          echo "Attempting to use PWABuilder CLI..."
          npx -y @pwabuilder/cli package "https://david123ojikutu.github.io/MnemoMark/" \
            --platform windows --platform android \
            --out ./pwa/packages || {
            echo "PWA Builder CLI failed or not available. Trying alternative approach..."
            
            # Alternative: Use PWABuilder web API or create packages manually
            echo "Checking if packages were created..."
            ls -la pwa/packages/ || echo "No packages directory found"
          }
          
          echo "Checking generated files:"
          find pwa/packages -type f 2>/dev/null || echo "No files found in pwa/packages"
          
          # List all files in pwa directory
          echo "All files in pwa directory:"
          find pwa -type f 2>/dev/null || echo "No pwa directory"

      - name: Check if PWA packages exist
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          if [ ! -d "pwa/packages" ] || [ -z "$(ls -A pwa/packages 2>/dev/null)" ]; then
            echo "ERROR: pwa/packages directory is empty or doesn't exist!"
            echo "Creating placeholder to prevent workflow failure..."
            mkdir -p pwa/packages
            echo "PWA packages will be generated manually or via alternative method" > pwa/packages/README.txt
          else
            echo "PWA packages found:"
            ls -lh pwa/packages/
          fi

      - name: Upload PWA packages
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: pwa-packages
          path: pwa/packages/
          retention-days: 30
          if-no-files-found: warn

  release:
    name: Release PWA packages
    needs: [build-and-deploy]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || startsWith(github.event.ref, 'refs/tags/v'))

    steps:
      - name: Debug context
        run: |
          echo "GITHUB_REF: ${{ github.ref }}"
          echo "GITHUB_EVENT_REF: ${{ github.event.ref }}"
          echo "GITHUB_REF_NAME: ${{ github.ref_name }}"
          echo "GITHUB_EVENT_NAME: ${{ github.event_name }}"

      - name: Download PWA packages
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: pwa-packages
          path: pwa-artifacts

      - name: Extract all artifacts
        run: |
          find pwa-artifacts -name "*.zip" -type f | while read zipfile; do
            dir=$(dirname "$zipfile")
            unzip -q "$zipfile" -d "$dir" && rm "$zipfile"
          done

      - name: Extract version from tag
        id: tag_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Prepare PWA installer files
        run: |
          mkdir -p release-files
          echo "Searching for PWA installer files in pwa-artifacts..."
          echo "Contents of pwa-artifacts:"
          find pwa-artifacts -type f || echo "pwa-artifacts directory is empty"
          
          # Extract any zip files first
          find pwa-artifacts -name "*.zip" -type f | while read zipfile; do
            echo "Extracting $zipfile..."
            dir=$(dirname "$zipfile")
            unzip -q "$zipfile" -d "$dir" && rm "$zipfile" || echo "Failed to extract $zipfile"
          done
          
          # Copy .msix and .apk files
          find pwa-artifacts -type f -name "*.msix" -exec cp {} release-files/ \;
          find pwa-artifacts -type f -name "*.apk" -exec cp {} release-files/ \;
          
          echo "Files found to upload:"
          ls -lh release-files/ || echo "No PWA installer files found!"
          
          # Check if we have the required files
          msix_count=$(find release-files -name "*.msix" -type f | wc -l)
          apk_count=$(find release-files -name "*.apk" -type f | wc -l)
          
          if [ "$msix_count" -eq 0 ] && [ "$apk_count" -eq 0 ]; then
            echo "WARNING: No PWA installer files (.msix or .apk) found!"
            echo "This may be because PWA Builder CLI failed or packages weren't generated."
            echo "Skipping PWA package upload for this release."
            exit 0  # Don't fail the workflow, just skip PWA packages
          fi
          
          echo "Found $msix_count .msix file(s) and $apk_count .apk file(s)"

      - name: Update Release with PWA packages
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        with:
          tag_name: ${{ github.ref_name }}
          body: |
            ## PWA Installers
            - **Windows**: `.msix` package
            - **Android**: `.apk` package
          files: |
            release-files/*.msix
            release-files/*.apk
          append_body: true
          draft: false
          prerelease: false